name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile Code
        run: ./mvnw compile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Unit Tests
        run: ./mvnw test

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Code Style & PMD simulation
        run: |
          echo "Starting simulated Code Quality Analysis..."
          echo "Running checkstyle check..."
          echo "No code style issues found!"
          echo "Simulated PMD scanning completed. 0 warnings, 0 errors."

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Package JAR (Skip Tests)
        run: ./mvnw package -DskipTests

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-list-api-jar
          path: target/*.jar
          retention-days: 5

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: package
    env:
      DEPLOY_ENVIRONMENT: ${{ secrets.DEPLOY_ENVIRONMENT }}
      API_TOKEN: ${{ secrets.API_TOKEN }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
    steps:
      - name: Simulate Deployment Configuration
        run: |
          echo "Preparing deployment configuration..."
          echo "Deployment target environment: ${DEPLOY_ENVIRONMENT:-simulation-staging}"
          echo "Connecting to destination server: ${SERVER_HOST:-localhost}"
          echo "Configuring environment variables using GitHub Secrets..."
          echo "Simulation: Verifying API Token presence..."
          if [ -n "$API_TOKEN" ]; then
            echo "API Token is successfully loaded from GitHub Secrets."
          else
            echo "API Token is not set. Using fallback configuration for testing."
          fi
          echo "Deployment completed successfully (simulated)."
